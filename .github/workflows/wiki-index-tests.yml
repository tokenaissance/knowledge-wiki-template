name: wiki-index.mjs Tests

on:
  workflow_call:

jobs:
  sort--uninitiated:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--sort--uninitiated
      command: node scripts/wiki/wiki-index.mjs sort

  sort--existing:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--sort--existing
      command: node scripts/wiki/wiki-index.mjs sort

  upsert-concept--insert:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--upsert-concept--insert
      command: node scripts/wiki/wiki-index.mjs upsert-concept "my-topic" "My Topic" "A test concept"

  upsert-concept--insert--sorted:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--upsert-concept--insert--sorted
      command: node scripts/wiki/wiki-index.mjs upsert-concept "apple" "Apple" "First alphabetically"

  upsert-concept--update:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--upsert-concept--update
      command: node scripts/wiki/wiki-index.mjs upsert-concept "my-topic" "My Topic" "Updated description"

  upsert-concept--update--sorted:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--upsert-concept--update--sorted
      command: node scripts/wiki/wiki-index.mjs upsert-concept "banana" "Banana" "Updated description"

  delete-concept:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--delete-concept
      command: node scripts/wiki/wiki-index.mjs delete-concept "my-topic"

  upsert-summary--insert:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--upsert-summary--insert
      command: node scripts/wiki/wiki-index.mjs upsert-summary "Notes/my-note.summary" "A test summary"

  upsert-summary--insert--sorted:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--upsert-summary--insert--sorted
      command: node scripts/wiki/wiki-index.mjs upsert-summary "Notes/m-note.summary" "M note"

  upsert-summary--update:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--upsert-summary--update
      command: node scripts/wiki/wiki-index.mjs upsert-summary "Notes/my-note.summary" "Updated summary"

  upsert-summary--update--sorted:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--upsert-summary--update--sorted
      command: node scripts/wiki/wiki-index.mjs upsert-summary "Notes/z-note.summary" "Z note updated"

  delete-summary:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--delete-summary
      command: node scripts/wiki/wiki-index.mjs delete-summary "Notes/my-note.summary"

  find-missing-summaries--empty:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--find-missing-summaries--empty
      command: node scripts/wiki/wiki-index.mjs find-missing-summaries

  find-missing-summaries--unindexed:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--find-missing-summaries--unindexed
      command: node scripts/wiki/wiki-index.mjs find-missing-summaries

  find-missing-concepts--empty:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--find-missing-concepts--empty
      command: node scripts/wiki/wiki-index.mjs find-missing-concepts

  find-missing-concepts--unindexed:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--find-missing-concepts--unindexed
      command: node scripts/wiki/wiki-index.mjs find-missing-concepts

  delete-dead-links:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-index--delete-dead-links
      command: node scripts/wiki/wiki-index.mjs delete-dead-links
